<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amazon Tracker v2</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
      --text: #e2e8f0; --text-muted: #94a3b8; --text-dim: #64748b;
      --accent: #3b82f6; --accent-hover: #2563eb;
      --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
      --border: #334155;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header { background: var(--surface); padding: 14px 28px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 18px; font-weight: 600; }
    .nav-links { display: flex; gap: 16px; margin-left: 32px; }
    .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: 500; padding: 4px 0; border-bottom: 2px solid transparent; transition: all .2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); border-color: var(--accent); }
    #last-fetched { margin-left: auto; font-size: 11px; color: var(--text-dim); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-right a { color: var(--accent); text-decoration: none; font-size: 12px; font-weight: 600; }

    main { max-width: 1600px; margin: 24px auto; padding: 0 16px; }

    .card { background: var(--surface); border-radius: 10px; padding: 20px 22px; margin-bottom: 18px; border: 1px solid var(--border); }
    .card h2 { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 14px; }

    .upload-row { display: flex; gap: 12px; align-items: flex-start; }
    .drop-zone { flex: 1; border: 2px dashed var(--border); border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; color: var(--text-muted); font-size: 13px; line-height: 1.7; transition: border-color .2s, background .2s; }
    .drop-zone:hover, .drop-zone.active { border-color: var(--accent); background: rgba(59,130,246,0.05); }
    .drop-zone input { display: none; }
    .drop-zone strong { display: block; font-size: 14px; color: var(--text); margin-bottom: 4px; }
    .sep { display: flex; align-items: center; gap: 8px; color: var(--text-dim); font-size: 12px; }
    .sep::before, .sep::after { content: ""; flex: 1; height: 1px; background: var(--border); }
    textarea#asin-input { flex: 1; height: 100px; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 13px; font-family: monospace; resize: vertical; outline: none; background: var(--bg); color: var(--text); }
    textarea#asin-input:focus { border-color: var(--accent); }

    #asin-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .chip { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 11px; font-family: monospace; }
    .chip a { color: var(--accent); text-decoration: none; }
    .chip a:hover { text-decoration: underline; }

    .btn-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    button { padding: 8px 20px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s, background .15s; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    #btn-scrape { background: var(--accent); color: #fff; }
    #btn-scrape:hover:not(:disabled) { background: var(--accent-hover); }
    #btn-download { background: var(--surface2); color: var(--text); display: none; }
    #btn-download:hover { background: #475569; }
    #btn-download-filtered { background: #166534; color: #fff; display: none; }
    #btn-download-filtered:hover { background: #14532d; }
    #btn-clear { background: var(--surface2); color: var(--text-muted); }
    #btn-clear:hover { background: #475569; }
    #btn-stop { background: var(--danger); color: #fff; display: none; }
    #btn-stop:hover { background: #dc2626; }

    #progress-wrap { display: none; margin-top: 14px; }
    .progress-bar-bg { height: 6px; background: var(--bg); border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
    .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; width: 0%; transition: width .4s; }
    #progress-label { font-size: 12px; color: var(--text-muted); }

    /* Filter bar */
    #filter-bar { display: none; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 14px; }
    .filter-row { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group > label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; }
    .filter-pair { display: flex; gap: 6px; align-items: center; }
    .filter-pair span { font-size: 11px; color: var(--text-dim); }
    .filter-pair input[type=number], input[type=date] { width: 80px; padding: 5px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; outline: none; background: var(--surface); color: var(--text); }
    .filter-pair input[type=number]:focus, input[type=date]:focus { border-color: var(--accent); }
    input[type=date] { width: auto; }
    .filter-group.checkbox { flex-direction: row; align-items: center; gap: 7px; padding-bottom: 2px; }
    .filter-group.checkbox > label { font-size: 13px; text-transform: none; letter-spacing: 0; font-weight: 500; color: var(--text); cursor: pointer; }
    .filter-actions { display: flex; gap: 8px; align-items: flex-end; margin-left: auto; }
    .btn-sm { padding: 6px 16px; font-size: 12px; }

    /* Results */
    #results-section { display: none; }
    .results-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .count-badge { display: inline-block; background: var(--accent); color: #fff; border-radius: 99px; padding: 1px 9px; font-size: 12px; font-weight: 700; }
    .filtered-badge { display: none; background: #166534; color: #fff; border-radius: 99px; padding: 1px 9px; font-size: 12px; font-weight: 700; }

    .expiry-legend { display: flex; gap: 14px; font-size: 11px; color: var(--text-muted); margin-left: auto; align-items: center; }
    .legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; }
    .legend-dot.red { background: rgba(239,68,68,0.3); border: 1px solid #ef4444; }
    .legend-dot.orange { background: rgba(245,158,11,0.3); border: 1px solid #f59e0b; }

    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th {
      background: var(--surface2); color: var(--text); padding: 9px 10px; text-align: left;
      white-space: nowrap; font-weight: 600; position: sticky; top: 0;
      cursor: pointer; user-select: none; border-bottom: 1px solid var(--border);
    }
    thead th:hover { background: #475569; }
    thead th .sort-icon { opacity: .45; margin-left: 4px; font-size: 10px; }
    thead th.sort-asc .sort-icon::after { content: "▲"; opacity: 1; }
    thead th.sort-desc .sort-icon::after { content: "▼"; opacity: 1; }
    thead th:not(.sort-asc):not(.sort-desc) .sort-icon::after { content: "⇅"; }

    tbody tr { border-bottom: 1px solid rgba(51,65,85,0.5); }
    tbody tr:nth-child(even) { background: rgba(15,23,42,0.3); }
    tbody tr:hover { background: rgba(59,130,246,0.08) !important; }

    tbody tr.expiry-red { background: rgba(239,68,68,0.1) !important; }
    tbody tr.expiry-orange { background: rgba(245,158,11,0.1) !important; }

    td { padding: 8px 10px; vertical-align: top; color: var(--text); }
    td.mono { font-family: monospace; font-size: 11px; }
    td.title-cell { max-width: 220px; }
    .title-short { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; display: block; }
    td.status-ok { color: var(--success); font-weight: 600; }
    td.status-err { color: var(--danger); font-weight: 600; }
    td.deal-yes { color: var(--warning); font-weight: 700; }
    td.bsr-cell { font-size: 11px; max-width: 160px; }
    td.fba { color: #06b6d4; font-weight: 600; }
    td.easyship { color: var(--warning); font-weight: 600; }
    td.fbm { color: var(--text-muted); }
    a.asin-link { color: var(--accent); font-family: monospace; font-size: 11px; }

    #error-msg { color: var(--danger); font-size: 13px; margin-top: 10px; display: none; }

    .ws-status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .ws-status.connected { background: var(--success); }
    .ws-status.disconnected { background: var(--danger); }

    .sheet-row { margin-top: 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .sheet-row input { flex: 1; min-width: 280px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; background: var(--bg); color: var(--text); }
    .sheet-row input:focus { border-color: var(--accent); }
    #btn-fetch-sheet { background: var(--accent); color: #fff; padding: 6px 16px; font-size: 13px; }
    #sheet-status { font-size: 12px; color: var(--success); }
  </style>
</head>
<body>

<header>
  <span>📦</span>
  <h1>Amazon Tracker v2</h1>
  <nav class="nav-links">
    <a href="/" class="active">Dashboard</a>
    <a href="/history-page">History</a>
    <a href="/keywords-page">Keywords</a>
  </nav>
  <div class="header-right">
    <span id="last-fetched"></span>
    <span class="ws-status disconnected" id="ws-dot" title="WebSocket"></span>
    <a href="/logout">Logout</a>
  </div>
</header>

<main>
  <div class="card">
    <h2>Load ASINs</h2>
    <div class="upload-row">
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept=".csv,.txt" />
        <strong>Drop CSV / TXT here</strong>
        or click to browse<br/>
        <small>One ASIN per line or comma-separated</small>
      </div>
      <div class="sep">or</div>
      <textarea id="asin-input" placeholder="Paste ASINs here&#10;B08N5WRWNW&#10;B07XJ8C8F5&#10;..."></textarea>
    </div>
    <div class="sheet-row">
      <span style="font-size:12px;color:var(--text-muted);font-weight:600;white-space:nowrap;">Google Sheet:</span>
      <input type="text" id="sheet-url" placeholder="Paste public Google Sheet URL...">
      <button id="btn-fetch-sheet">Load ASINs</button>
      <span id="sheet-status"></span>
    </div>

    <div id="asin-chips"></div>
    <div id="error-msg"></div>
    <div class="btn-row">
      <button id="btn-scrape" disabled>Fetch Data</button>
      <button id="btn-download">Download All</button>
      <button id="btn-download-filtered">Download Filtered</button>
      <button id="btn-stop">Stop</button>
      <button id="btn-clear">Clear</button>
    </div>
    <div id="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
      <div id="progress-label">Preparing...</div>
    </div>
  </div>

  <div class="card" id="results-section">
    <div class="results-header">
      <h2 style="margin-bottom:0">Results</h2>
      <span class="count-badge" id="result-count">0</span>
      <span class="filtered-badge" id="filtered-count"></span>
      <button class="btn-sm" id="btn-toggle-filters" style="background:var(--surface2);color:var(--text-muted);">Filters</button>
      <div class="expiry-legend">
        <span><span class="legend-dot red"></span>Expiring &le; 30d</span>
        <span><span class="legend-dot orange"></span>Expiring &le; 60d</span>
      </div>
    </div>

    <div id="filter-bar">
      <div class="filter-row">
        <div class="filter-group">
          <label>Rating</label>
          <div class="filter-pair">
            <input type="number" id="f-rating-min" min="0" max="5" step="0.1" placeholder="Min">
            <span>&ndash;</span>
            <input type="number" id="f-rating-max" min="0" max="5" step="0.1" placeholder="Max">
          </div>
        </div>
        <div class="filter-group">
          <label>No. of Ratings</label>
          <div class="filter-pair">
            <input type="number" id="f-count-min" min="0" placeholder="Min">
            <span>&ndash;</span>
            <input type="number" id="f-count-max" min="0" placeholder="Max">
          </div>
        </div>
        <div class="filter-group">
          <label>Use By (before)</label>
          <input type="date" id="f-use-by">
        </div>
        <div class="filter-group checkbox">
          <input type="checkbox" id="f-deal">
          <label for="f-deal">Deals Only</label>
        </div>
        <div class="filter-actions">
          <button class="btn-sm" id="btn-apply" style="background:var(--accent);color:#fff">Apply</button>
          <button class="btn-sm" id="btn-reset-filter" style="background:var(--surface2);color:var(--text-muted)">Reset</button>
        </div>
      </div>
    </div>

    <div class="table-scroll">
      <table id="result-table">
        <thead>
          <tr>
            <th data-col="#"># <span class="sort-icon"></span></th>
            <th data-col="asin">ASIN <span class="sort-icon"></span></th>
            <th data-col="title">Title <span class="sort-icon"></span></th>
            <th data-col="rating">Rating <span class="sort-icon"></span></th>
            <th data-col="rating_count">Ratings <span class="sort-icon"></span></th>
            <th data-col="bsr">BSR <span class="sort-icon"></span></th>
            <th data-col="price">Price <span class="sort-icon"></span></th>
            <th data-col="seller">Seller <span class="sort-icon"></span></th>
            <th data-col="fulfillment">Fulfillment <span class="sort-icon"></span></th>
            <th data-col="deal">Deal <span class="sort-icon"></span></th>
            <th data-col="use_by">Use By <span class="sort-icon"></span></th>
            <th data-col="status">Status <span class="sort-icon"></span></th>
          </tr>
        </thead>
        <tbody id="result-body"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
  let asins = [];
  let allResults = [];
  let filteredResults = [];
  let sortCol = null;
  let sortDir = 1;
  let ws = null;

  const TODAY = new Date();
  TODAY.setHours(0, 0, 0, 0);

  // WebSocket connection
  function connectWS() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(`${proto}//${location.host}/ws/progress`);
    ws.onopen = () => { document.getElementById("ws-dot").className = "ws-status connected"; };
    ws.onclose = () => {
      document.getElementById("ws-dot").className = "ws-status disconnected";
      setTimeout(connectWS, 3000);
    };
    ws.onmessage = (e) => {
      const d = JSON.parse(e.data);
      handleProgress(d);
    };
  }
  connectWS();

  function handleProgress(d) {
    if (d.running) {
      document.getElementById("progress-wrap").style.display = "block";
      document.getElementById("btn-stop").style.display = "inline-block";
      document.getElementById("btn-scrape").disabled = true;

      const pct = d.total > 0 ? Math.round((d.progress / d.total) * 100) : 0;
      document.getElementById("progress-fill").style.width = pct + "%";

      let label = "";
      if (d.round > 1) {
        label = `Round ${d.round}/${d.round_total} — Re-scraping errors — ${d.progress}/${d.total}`;
      } else {
        label = `Fetching ${d.progress}/${d.total} — ${d.current_asin}`;
      }
      document.getElementById("progress-label").textContent = label;

      if (d.results && d.results.length) {
        allResults = d.results;
        filteredResults = [...allResults];
        document.getElementById("result-count").textContent = allResults.length;
        document.getElementById("results-section").style.display = "block";
        renderTable(filteredResults);
      }
    } else {
      document.getElementById("btn-stop").style.display = "none";
      document.getElementById("btn-scrape").disabled = asins.length === 0;
      if (d.result_count > 0) {
        document.getElementById("progress-label").textContent = `Done — ${d.result_count} results`;
        document.getElementById("progress-fill").style.width = "100%";
        document.getElementById("btn-download").style.display = "inline-block";
      }
      if (d.last_scraped_at) {
        document.getElementById("last-fetched").textContent = "Last: " + d.last_scraped_at.slice(0, 16) + " UTC";
      }
      if (d.results && d.results.length) {
        allResults = d.results;
        filteredResults = [...allResults];
        document.getElementById("result-count").textContent = allResults.length;
        document.getElementById("results-section").style.display = "block";
        renderTable(filteredResults);
      }
    }
  }

  // Load existing results on page load
  (async () => {
    try {
      const r = await (await fetch("/results")).json();
      if (r.results && r.results.length) {
        allResults = r.results;
        filteredResults = [...allResults];
        document.getElementById("result-count").textContent = allResults.length;
        document.getElementById("btn-download").style.display = "inline-block";
        document.getElementById("results-section").style.display = "block";
        renderTable(filteredResults);
      }
      if (r.last_scraped_at) {
        document.getElementById("last-fetched").textContent = "Last: " + r.last_scraped_at.slice(0, 16) + " UTC";
      }
    } catch(e) {}
  })();

  // ASIN helpers
  function parseAsins(text) {
    return text.split(/[\n,;\t\s]+/).map(s => s.trim().toUpperCase()).filter(s => /^[A-Z0-9]{10}$/.test(s));
  }

  function renderChips() {
    const c = document.getElementById("asin-chips");
    c.innerHTML = "";
    asins.forEach(a => {
      const d = document.createElement("div");
      d.className = "chip";
      d.innerHTML = `<a href="https://www.amazon.in/dp/${a}" target="_blank">${a}</a>`;
      c.appendChild(d);
    });
    document.getElementById("btn-scrape").disabled = asins.length === 0;
  }

  // File upload
  const dropZone = document.getElementById("drop-zone");
  const fileInput = document.getElementById("file-input");
  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("active"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("active"));
  dropZone.addEventListener("drop", e => { e.preventDefault(); dropZone.classList.remove("active"); if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener("change", () => { if (fileInput.files[0]) readFile(fileInput.files[0]); });

  function readFile(file) {
    const r = new FileReader();
    r.onload = e => { asins = [...new Set([...asins, ...parseAsins(e.target.result)])]; renderChips(); };
    r.readAsText(file);
  }

  document.getElementById("asin-input").addEventListener("input", function () {
    asins = [...new Set(parseAsins(this.value))];
    renderChips();
  });

  // Scrape
  document.getElementById("btn-scrape").addEventListener("click", async () => {
    hideError();
    const res = await fetch("/scrape", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ asins }),
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error); return; }
    document.getElementById("btn-scrape").disabled = true;
    document.getElementById("btn-stop").style.display = "inline-block";
    document.getElementById("btn-download").style.display = "none";
    document.getElementById("btn-download-filtered").style.display = "none";
    document.getElementById("progress-wrap").style.display = "block";
    document.getElementById("progress-label").textContent = `Starting scrape of ${data.total} ASINs...`;
  });

  // Stop
  document.getElementById("btn-stop").addEventListener("click", async () => {
    await fetch("/stop", { method: "POST" });
    document.getElementById("btn-stop").style.display = "none";
    document.getElementById("btn-scrape").disabled = asins.length === 0;
    document.getElementById("progress-label").textContent = "Stopped";
  });

  // Clear
  document.getElementById("btn-clear").addEventListener("click", () => {
    asins = []; allResults = []; filteredResults = [];
    document.getElementById("asin-input").value = "";
    document.getElementById("asin-chips").innerHTML = "";
    document.getElementById("btn-scrape").disabled = true;
    document.getElementById("btn-download").style.display = "none";
    document.getElementById("btn-download-filtered").style.display = "none";
    document.getElementById("results-section").style.display = "none";
    document.getElementById("result-body").innerHTML = "";
    hideError();
  });

  // Google Sheet loader
  document.getElementById("btn-fetch-sheet").addEventListener("click", async () => {
    const url = document.getElementById("sheet-url").value.trim();
    if (!url) { showError("Enter a Google Sheet URL"); return; }
    hideError();
    const btn = document.getElementById("btn-fetch-sheet");
    const status = document.getElementById("sheet-status");
    btn.disabled = true; btn.textContent = "Fetching..."; status.textContent = "";
    try {
      const res = await fetch("/fetch-sheet", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ url }) });
      const data = await res.json();
      if (!res.ok) { showError(data.error); return; }
      asins = [...new Set([...asins, ...data.asins])];
      renderChips();
      status.textContent = `Loaded ${data.count} ASINs`;
    } catch (e) { showError("Failed: " + e.message); }
    finally { btn.disabled = false; btn.textContent = "Load ASINs"; }
  });

  // Helpers
  function parseRatingCount(str) { if (!str) return 0; const m = String(str).match(/[\d,]+/); return m ? parseInt(m[0].replace(/,/g, "")) : 0; }

  function parseUseByDate(str) {
    if (!str) return null;
    const MONTHS = { JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11 };
    let m = str.toUpperCase().match(/(\d{1,2})\s+([A-Z]{3})\s+(\d{4})/);
    if (m) return new Date(+m[3], MONTHS[m[2]] ?? 0, +m[1]);
    m = str.match(/(\d{4})-(\d{2})-(\d{2})/);
    if (m) return new Date(+m[1], +m[2]-1, +m[3]);
    return null;
  }

  function expiryClass(useby) {
    const d = parseUseByDate(useby);
    if (!d) return "";
    const days = (d - TODAY) / 86400000;
    if (days <= 30) return "expiry-red";
    if (days <= 60) return "expiry-orange";
    return "";
  }

  // Filters
  function applyFilters() {
    const rMin = document.getElementById("f-rating-min").value;
    const rMax = document.getElementById("f-rating-max").value;
    const cMin = document.getElementById("f-count-min").value;
    const cMax = document.getElementById("f-count-max").value;
    const useByStr = document.getElementById("f-use-by").value;
    const dealOnly = document.getElementById("f-deal").checked;
    let useByDate = null;
    if (useByStr) { const [y, mo, d] = useByStr.split("-").map(Number); useByDate = new Date(y, mo - 1, d); }

    filteredResults = allResults.filter(r => {
      const rating = parseFloat(r.rating) || 0;
      const count = parseRatingCount(r.rating_count);
      if (rMin !== "" && rating < parseFloat(rMin)) return false;
      if (rMax !== "" && rating > parseFloat(rMax)) return false;
      if (cMin !== "" && count < parseInt(cMin)) return false;
      if (cMax !== "" && count > parseInt(cMax)) return false;
      if (dealOnly && r.deal !== "Yes") return false;
      if (useByDate) { const d = parseUseByDate(r.use_by); if (!d || d > useByDate) return false; }
      return true;
    });

    const badge = document.getElementById("filtered-count");
    const isFiltered = filteredResults.length < allResults.length;
    badge.textContent = isFiltered ? `${filteredResults.length} shown` : "";
    badge.style.display = isFiltered ? "inline-block" : "none";
    document.getElementById("btn-download-filtered").style.display = isFiltered ? "inline-block" : "none";
    renderTable(filteredResults);
  }

  document.getElementById("btn-apply").addEventListener("click", applyFilters);
  document.getElementById("btn-reset-filter").addEventListener("click", () => {
    ["f-rating-min","f-rating-max","f-count-min","f-count-max","f-use-by"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("f-deal").checked = false;
    filteredResults = [...allResults];
    document.getElementById("filtered-count").style.display = "none";
    document.getElementById("btn-download-filtered").style.display = "none";
    renderTable(filteredResults);
  });
  document.getElementById("btn-toggle-filters").addEventListener("click", () => {
    const bar = document.getElementById("filter-bar");
    bar.style.display = bar.style.display === "block" ? "none" : "block";
  });

  // Sorting
  document.querySelectorAll("thead th[data-col]").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      if (col === "#") return;
      sortDir = sortCol === col ? sortDir * -1 : 1;
      sortCol = col;
      document.querySelectorAll("thead th").forEach(t => t.classList.remove("sort-asc", "sort-desc"));
      th.classList.add(sortDir === 1 ? "sort-asc" : "sort-desc");
      renderTable(filteredResults);
    });
  });

  function sortValue(r, col) {
    const v = r[col] ?? "";
    if (col === "rating") return parseFloat(v) || 0;
    if (col === "rating_count") return parseRatingCount(v);
    if (col === "price") return parseFloat(String(v).replace(/[^\d.]/g, "")) || 0;
    if (col === "use_by") return parseUseByDate(v)?.getTime() || 0;
    if (col === "bsr") { const m = String(v).match(/[\d,]+/); return m ? parseInt(m[0].replace(/,/g,"")) : 999999; }
    return String(v).toLowerCase();
  }

  // Render
  function shortTitle(t) {
    if (!t) return "—";
    const words = t.trim().split(/\s+/);
    return words.length > 10 ? words.slice(0, 10).join(" ") + "…" : t.trim();
  }

  function renderTable(rows) {
    let sorted = [...rows];
    if (sortCol) {
      sorted.sort((a, b) => { const va = sortValue(a, sortCol), vb = sortValue(b, sortCol); return va < vb ? -sortDir : va > vb ? sortDir : 0; });
    }
    const tbody = document.getElementById("result-body");
    tbody.innerHTML = "";
    sorted.forEach((r, i) => {
      const tr = document.createElement("tr");
      const ec = expiryClass(r.use_by);
      if (ec) tr.classList.add(ec);
      const url = r.url || `https://www.amazon.in/dp/${r.asin}`;
      const ful = r.fulfillment || "";
      const fulClass = ful === "FBA" ? "fba" : ful === "Easy Ship" ? "easyship" : ful ? "fbm" : "";
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td class="mono"><a class="asin-link" href="${url}" target="_blank">${r.asin || ""}</a></td>
        <td class="title-cell" title="${(r.title||"").replace(/"/g,"&quot;")}"><span class="title-short">${shortTitle(r.title)}</span></td>
        <td>${r.rating || "—"}</td>
        <td>${r.rating_count || "—"}</td>
        <td class="bsr-cell">${r.bsr || "—"}</td>
        <td>${r.price || "—"}</td>
        <td>${r.seller || "—"}</td>
        <td class="${fulClass}">${ful || "—"}</td>
        <td class="${r.deal === "Yes" ? "deal-yes" : ""}">${r.deal || "No"}</td>
        <td>${r.use_by || "—"}</td>
        <td class="${r.status === "OK" ? "status-ok" : "status-err"}">${r.status || ""}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  // Downloads
  document.getElementById("btn-download").addEventListener("click", () => { window.location.href = "/products/download"; });
  document.getElementById("btn-download-filtered").addEventListener("click", async () => {
    const res = await fetch("/download-filtered", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ rows: filteredResults }) });
    if (!res.ok) { showError("Download failed"); return; }
    const blob = await res.blob();
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "amazon_tracker_filtered.xlsx"; a.click();
  });

  function showError(msg) { const e = document.getElementById("error-msg"); e.textContent = msg; e.style.display = "block"; }
  function hideError() { document.getElementById("error-msg").style.display = "none"; }
</script>
</body>
</html>
