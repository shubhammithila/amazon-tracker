<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amazon Tracker v2 — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 36px 40px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 380px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: #3b82f6;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .logo h1 { font-size: 17px; font-weight: 700; color: #f8fafc; }
    .logo p  { font-size: 12px; color: #94a3b8; margin-top: 1px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8;
            text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    input[type=password] {
      width: 100%; padding: 10px 12px;
      border: 1px solid #334155; border-radius: 8px;
      background: #0f172a; color: #e2e8f0;
      font-size: 14px; outline: none;
      transition: border-color .2s;
    }
    input[type=password]:focus { border-color: #3b82f6; }
    button {
      width: 100%; margin-top: 16px;
      padding: 11px; background: #3b82f6; color: #fff;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #2563eb; }
    .error {
      margin-top: 14px; padding: 9px 12px;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 6px;
      color: #f87171; font-size: 13px; text-align: center;
    }
    .footer { margin-top: 24px; font-size: 11px; color: #475569; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📦</div>
      <div>
        <h1>Amazon Tracker v2</h1>
        <p>Private — sign in to continue</p>
      </div>
    </div>

    <form method="POST">
      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             placeholder="Enter your password" autofocus autocomplete="current-password" />
      <button type="submit">Sign In</button>
    </form>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
  </div>
  <div class="footer">Amazon Tracker v2 &nbsp;·&nbsp; httpx + FastAPI + PostgreSQL</div>
</body>
</html>
